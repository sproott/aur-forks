name: AUR fixup
on:
  pull_request:
    types: [opened, synchronize]
    branches: [main]

permissions:
  contents: write

env:
  BOT_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

jobs:
  # Skip the heavy fixup job on our own checksum commit. A skipped required check
  # still passes branch protection, so auto-merge proceeds — and the container
  # never spins up, so the bot can't loop on its own commit.
  detect:
    runs-on: ubuntu-latest
    outputs:
      self: ${{ steps.check.outputs.self }}
    steps:
      - id: check
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          author=$(gh api "repos/${{ github.repository }}/commits/${{ github.event.pull_request.head.sha }}" \
                   --jq '.commit.author.email')
          [ "$author" = "$BOT_EMAIL" ] && self=true || self=false
          echo "head commit author: $author (self=$self)"
          echo "self=$self" >> "$GITHUB_OUTPUT"

  fixup:
    needs: detect
    # `!cancelled()` (not a bare condition) keeps fixup running even if detect
    # failed, so a broken gate can't let an un-fixed PR sail through auto-merge.
    if: ${{ !cancelled() && needs.detect.outputs.self != 'true' }}
    runs-on: ubuntu-latest
    container: archlinux:base-devel
    steps:
      - name: Install tooling
        run: pacman -Sy --noconfirm git pacman-contrib

      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0
          token: ${{ secrets.FIXUP_TOKEN }} # PAT or App token, NOT GITHUB_TOKEN

      - name: Determine changed package dirs
        id: changed
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --no-tags origin "${{ github.base_ref }}"
          dirs=$(git diff --name-only "origin/${{ github.base_ref }}...HEAD" \
                 | grep -E '(^|/)PKGBUILD$' | xargs -r -n1 dirname | sort -u)
          {
            echo "dirs<<EOF"
            echo "$dirs"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Regenerate sums and .SRCINFO
        if: steps.changed.outputs.dirs != ''
        run: |
          useradd -m builder
          chown -R builder .
          while IFS= read -r dir; do
            [ -z "$dir" ] && continue
            echo "::group::$dir"
            sudo -u builder bash -c "cd '$dir' && updpkgsums && makepkg --printsrcinfo > .SRCINFO"
            echo "::endgroup::"
          done <<< "${{ steps.changed.outputs.dirs }}"

      - name: Commit back
        if: steps.changed.outputs.dirs != ''
        uses: stefanzweifel/git-auto-commit-action@4a55954c782fc1ea30b9056cd3e7a2b40ca8887d # v7.2.0
        with:
          commit_message: "chore: update checksums and .SRCINFO"
          add_options: "-u" # tracked files only — don't stage downloaded sources
          # override author so it matches the committer default (detect gate + gitIgnoredAuthors)
          commit_author: "github-actions[bot] <${{ env.BOT_EMAIL }}>"
